<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="海鲜记账">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
    <title>海鲜买卖收入系统</title>
    <style>
        :root {
            --ocean-deep: #0a3d62;
            --ocean-mid: #1e6fa0;
            --ocean-light: #4da8da;
            --ocean-surface: #c5e4f3;
            --ocean-foam: #e8f4f8;
            --coral: #ff6b6b;
            --coral-light: #ff9a9a;
            --gold: #f0a500;
            --gold-light: #ffd166;
            --profit-green: #10b981;
            --text-dark: #1a2b3c;
            --text-mid: #3d5a6e;
            --text-light: #6b8299;
            --card-bg: #ffffff;
            --bg: #f0f5f9;
            --shadow-sm: 0 1px 3px rgba(10, 61, 98, 0.08);
            --shadow-md: 0 4px 16px rgba(10, 61, 98, 0.12);
            --shadow-lg: 0 8px 32px rgba(10, 61, 98, 0.16);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --font-xs: 0.7rem;
            --font-sm: 0.8rem;
            --font-md: 0.9rem;
            --font-lg: 1.05rem;
            --font-xl: 1.25rem;
            --font-2xl: 1.6rem;
            --font-3xl: 2rem;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(77, 168, 218, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 20%, rgba(240, 165, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 15% 80%, rgba(30, 111, 160, 0.06) 0%, transparent 50%);
            color: var(--text-dark);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-bottom: calc(100px + var(--safe-bottom));
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(180deg,
                    rgba(30, 111, 160, 0.07) 0%,
                    rgba(77, 168, 218, 0.03) 40%,
                    transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px 14px;
        }

        .header {
            text-align: center;
            padding: 10px 0 6px;
            position: relative;
        }

        .header-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 2px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(10, 61, 98, 0.15));
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .header-title {
            font-size: var(--font-2xl);
            font-weight: 700;
            color: var(--ocean-deep);
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: var(--font-xs);
            color: var(--text-light);
            font-weight: 400;
            margin-top: 2px;
        }

        .date-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 12px 0 10px;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 10px 16px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--ocean-surface);
        }

        .date-nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--ocean-surface);
            background: var(--ocean-foam);
            color: var(--ocean-mid);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .date-nav-btn:active {
            background: var(--ocean-surface);
            transform: scale(0.93);
            border-color: var(--ocean-light);
        }

        .date-display {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--ocean-deep);
            min-width: 130px;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .date-today-badge {
            display: inline-block;
            background: var(--coral);
            color: #fff;
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 4px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        .summary-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 16px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow-md);
            border: 1.5px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: var(--radius-lg);
            padding: 1.5px;
            background: linear-gradient(135deg, var(--ocean-light), var(--gold-light), var(--coral-light));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .summary-item {
            text-align: center;
            padding: 6px 4px;
        }

        .summary-label {
            font-size: var(--font-xs);
            color: var(--text-light);
            margin-bottom: 4px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .summary-value {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0.3px;
        }

        .summary-value.cost {
            color: var(--ocean-mid);
        }
        .summary-value.revenue {
            color: var(--gold);
        }
        .summary-value.profit {
            color: var(--profit-green);
            font-size: var(--font-xl);
        }
        .summary-value.profit.negative {
            color: var(--coral);
        }

        .remaining-hint {
            text-align: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--ocean-surface);
            font-size: var(--font-xs);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .remaining-hint strong {
            color: var(--ocean-mid);
        }

        .items-section-label {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 14px 15px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--ocean-surface);
            transition: var(--transition);
            position: relative;
            animation: cardIn 0.35s ease-out;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .item-card:focus-within {
            border-color: var(--ocean-light);
            box-shadow: var(--shadow-md), 0 0 0 4px rgba(77, 168, 218, 0.08);
        }

        .item-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .item-number-badge {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--ocean-mid);
            color: #fff;
            font-size: var(--font-xs);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .item-name-input {
            flex: 1;
            border: none;
            border-bottom: 2px solid var(--ocean-surface);
            padding: 7px 4px;
            font-size: var(--font-lg);
            font-weight: 600;
            color: var(--text-dark);
            background: transparent;
            outline: none;
            transition: var(--transition);
            letter-spacing: 0.3px;
            min-width: 0;
        }

        .item-name-input:focus {
            border-bottom-color: var(--ocean-light);
        }
        .item-name-input::placeholder {
            color: #c0cdd6;
            font-weight: 400;
        }

        .item-delete-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: #fff0f0;
            color: #e07070;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .item-delete-btn:active {
            background: #ffd4d4;
            transform: scale(0.9);
        }

        .item-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 10px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .field-group.full-width {
            grid-column: 1 / -1;
        }

        .field-label {
            font-size: var(--font-xs);
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .field-input {
            border: 1.5px solid var(--ocean-surface);
            border-radius: var(--radius-sm);
            padding: 9px 10px;
            font-size: var(--font-md);
            color: var(--text-dark);
            background: #fafcfd;
            outline: none;
            transition: var(--transition);
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            letter-spacing: 0.2px;
        }

        .field-input:focus {
            border-color: var(--ocean-light);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(77, 168, 218, 0.06);
        }

        .field-input[readonly] {
            background: #f5f8fa;
            color: var(--text-mid);
            font-weight: 600;
            cursor: default;
            border-style: dashed;
        }

        .field-input.input-profit {
            font-weight: 700;
            font-size: var(--font-lg);
        }
        .field-input.input-profit.positive {
            color: var(--profit-green);
            border-color: #a7f3d0;
            background: #f0fdf6;
        }
        .field-input.input-profit.negative {
            color: var(--coral);
            border-color: #fecaca;
            background: #fff5f5;
        }

        .field-input::placeholder {
            color: #c8d4dc;
        }

        .actions-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 18px;
            border-radius: var(--radius-xl);
            font-size: var(--font-md);
            font-weight: 600;
            border: none;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .btn:active {
            transform: scale(0.96);
            filter: brightness(0.92);
        }

        .btn-add {
            background: var(--ocean-foam);
            color: var(--ocean-mid);
            border: 1.5px solid var(--ocean-surface);
        }

        .btn-add:active {
            background: var(--ocean-surface);
        }

        .btn-save {
            background: var(--ocean-mid);
            color: #fff;
            box-shadow: 0 4px 14px rgba(30, 111, 160, 0.3);
            font-weight: 700;
        }
        .btn-save:active {
            box-shadow: 0 2px 6px rgba(30, 111, 160, 0.25);
        }

        .btn-history {
            background: #fff;
            color: var(--text-mid);
            border: 1.5px solid #dde6ed;
            flex: 0.5;
        }

        .btn-clear {
            background: #fff;
            color: var(--coral);
            border: 1.5px solid #fecaca;
            flex: 0.5;
        }
        .btn-clear:active {
            background: #fff5f5;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 14px calc(10px + var(--safe-bottom));
            border-top: 1px solid rgba(197, 228, 243, 0.6);
            z-index: 50;
            display: flex;
            gap: 8px;
            max-width: 500px;
            margin: 0 auto;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--ocean-deep);
            color: #fff;
            padding: 11px 22px;
            border-radius: var(--radius-xl);
            font-size: var(--font-sm);
            font-weight: 600;
            letter-spacing: 0.3px;
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 8px 28px rgba(10, 61, 98, 0.3);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: var(--profit-green);
        }
        .toast.info {
            background: var(--ocean-mid);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 30, 50, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-sheet {
            background: #fff;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            max-height: 80dvh;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -8px 40px rgba(10, 61, 98, 0.18);
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }

        .modal-handle {
            width: 36px;
            height: 5px;
            background: #d0dce4;
            border-radius: 3px;
            margin: 10px auto;
            flex-shrink: 0;
        }

        .modal-header {
            padding: 6px 18px 12px;
            text-align: center;
            border-bottom: 1px solid var(--ocean-surface);
            flex-shrink: 0;
        }
        .modal-title {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--ocean-deep);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .history-date-item {
            background: #f9fbfc;
            border: 1.5px solid var(--ocean-surface);
            border-radius: var(--radius-md);
            padding: 12px 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        .history-date-item:active {
            background: var(--ocean-foam);
            border-color: var(--ocean-light);
            transform: scale(0.98);
        }
        .history-date-label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: var(--font-md);
        }
        .history-date-profit {
            font-weight: 700;
            font-size: var(--font-md);
        }
        .history-date-profit.positive {
            color: var(--profit-green);
        }
        .history-date-profit.negative {
            color: var(--coral);
        }
        .history-date-arrow {
            color: #c0cdd6;
            font-size: 1.1rem;
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: var(--font-md);
        }
        .history-empty-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .history-detail-back {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: var(--font-sm);
            color: var(--ocean-mid);
            cursor: pointer;
            padding: 8px 0;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
        }
        .history-detail-date {
            font-size: var(--font-xl);
            font-weight: 700;
            color: var(--ocean-deep);
            margin-bottom: 14px;
        }
        .history-item-card {
            background: #f9fbfc;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 8px;
            border: 1px solid var(--ocean-surface);
            font-size: var(--font-sm);
        }
        .history-item-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            color: var(--text-mid);
        }
        .history-item-row strong {
            color: var(--text-dark);
        }

        @media (min-width: 420px) {
            .item-fields {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .field-group.full-width {
                grid-column: 1 / -1;
            }
            .summary-value {
                font-size: var(--font-xl);
            }
            .summary-value.profit {
                font-size: var(--font-2xl);
            }
        }

        @media (max-width: 360px) {
            .item-fields {
                grid-template-columns: 1fr 1fr;
                gap: 6px 7px;
            }
            .field-input {
                padding: 8px 7px;
                font-size: var(--font-sm);
            }
            .summary-grid {
                gap: 4px;
            }
            .summary-value {
                font-size: var(--font-md);
            }
            .summary-value.profit {
                font-size: var(--font-lg);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <span class="header-icon">🐟</span>
            <h1 class="header-title">海鲜买卖收入系统</h1>
            <p class="header-subtitle">每日进货 · 销售 · 净利润一目了然</p>
        </div>

        <div class="date-bar">
            <button class="date-nav-btn" id="btnPrevDay" aria-label="前一天">◀</button>
            <div class="date-display" id="dateDisplay">--</div>
            <button class="date-nav-btn" id="btnNextDay" aria-label="后一天">▶</button>
        </div>

        <div class="summary-card">
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">📦 总进货成本</div>
                    <div class="summary-value cost" id="totalCost">¥0.00</div>
                </div>
                <div class="summary-item" style="position:relative;">
                    <div style="position:absolute;left:-1px;top:10%;bottom:10%;width:1px;background:var(--ocean-surface);border-radius:1px;"></div>
                    <div class="summary-label">💰 总售出金额</div>
                    <div class="summary-value revenue" id="totalRevenue">¥0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">📈 净利润</div>
                    <div class="summary-value profit" id="totalProfit">¥0.00</div>
                </div>
            </div>
            <div class="remaining-hint" id="remainingHint" style="display:none;">
                📋 剩余货物价值：<strong id="remainingValue">¥0.00</strong>（已从成本中扣除）
            </div>
        </div>

        <div class="items-section-label">🦐 货物明细</div>
        <div class="items-list" id="itemsList"></div>

        <div class="actions-bar">
            <button class="btn btn-add" id="btnAddItem">＋ 添加货物</button>
            <button class="btn btn-history" id="btnHistory">📅 历史</button>
            <button class="btn btn-clear" id="btnClear">🗑 清空</button>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-save" id="btnSave" style="flex:1;">💾 保存今日数据</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">📅 历史记录</div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'seafood_trade_records';
            const todayStr = getDateString(new Date());
            let currentDate = todayStr;
            let allRecords = {};
            let currentItems = [];
            let modalMode = 'list';
            let modalDetailDate = null;

            const $dateDisplay = document.getElementById('dateDisplay');
            const $itemsList = document.getElementById('itemsList');
            const $totalCost = document.getElementById('totalCost');
            const $totalRevenue = document.getElementById('totalRevenue');
            const $totalProfit = document.getElementById('totalProfit');
            const $remainingHint = document.getElementById('remainingHint');
            const $remainingValue = document.getElementById('remainingValue');
            const $toast = document.getElementById('toast');
            const $modalOverlay = document.getElementById('modalOverlay');
            const $modalTitle = document.getElementById('modalTitle');
            const $modalBody = document.getElementById('modalBody');
            const $btnPrevDay = document.getElementById('btnPrevDay');
            const $btnNextDay = document.getElementById('btnNextDay');
            const $btnAddItem = document.getElementById('btnAddItem');
            const $btnSave = document.getElementById('btnSave');
            const $btnHistory = document.getElementById('btnHistory');
            const $btnClear = document.getElementById('btnClear');

            function getDateString(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function formatDateDisplay(dateStr) {
                const parts = dateStr.split('-');
                return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
            }

            function formatMoney(num) {
                const n = parseFloat(num) || 0;
                const abs = Math.abs(n);
                const formatted = abs.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                return n < 0 ? `-¥${formatted}` : `¥${formatted}`;
            }

            function formatMoneyPlain(num) {
                const n = parseFloat(num) || 0;
                return n.toFixed(2);
            }

            function getWeekDay(dateStr) {
                const parts = dateStr.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                return days[d.getDay()];
            }

            function isToday(dateStr) {
                return dateStr === todayStr;
            }

            let toastTimer;
            function showToast(msg, type = 'info') {
                clearTimeout(toastTimer);
                $toast.textContent = msg;
                $toast.className = 'toast ' + type;
                requestAnimationFrame(() => {
                    $toast.classList.add('show');
                });
                toastTimer = setTimeout(() => {
                    $toast.classList.remove('show');
                }, 1800);
            }

            function loadAllRecords() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    allRecords = raw ? JSON.parse(raw) : {};
                } catch (e) {
                    allRecords = {};
                }
                if (typeof allRecords !== 'object' || allRecords === null) allRecords = {};
            }

            function saveAllRecords() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(allRecords));
                } catch (e) {
                    showToast('存储空间不足，请清理旧数据', 'info');
                }
            }

            function getRecord(dateStr) {
                return allRecords[dateStr] || null;
            }

            function setRecord(dateStr, items) {
                allRecords[dateStr] = {
                    items: items.map(item => ({
                        name: item.name || '',
                        quantity: parseFloat(item.quantity) || 0,
                        unitPrice: parseFloat(item.unitPrice) || 0,
                        totalSale: parseFloat(item.totalSale) || 0,
                        remaining: parseFloat(item.remaining) || 0,
                    })),
                    updatedAt: new Date().toISOString(),
                };
                saveAllRecords();
            }

            function deleteRecord(dateStr) {
                delete allRecords[dateStr];
                saveAllRecords();
            }

            function calcItemStats(item) {
                const quantity = parseFloat(item.quantity) || 0;
                const unitPrice = parseFloat(item.unitPrice) || 0;
                const totalSale = parseFloat(item.totalSale) || 0;
                const remaining = Math.min(parseFloat(item.remaining) || 0, quantity);
                const totalCost = quantity * unitPrice;
                const soldQty = quantity - remaining;
                const soldCost = soldQty * unitPrice;
                const profit = totalSale - soldCost;
                return {
                    totalCost,
                    soldQty,
                    soldCost,
                    profit,
                    remaining,
                    remainingValue: remaining * unitPrice,
                };
            }

            function calcSummary(items) {
                let totalCost = 0;
                let totalRevenue = 0;
                let totalProfit = 0;
                let totalRemainingValue = 0;
                let hasRemaining = false;

                items.forEach(item => {
                    const stats = calcItemStats(item);
                    totalCost += stats.totalCost;
                    totalRevenue += parseFloat(item.totalSale) || 0;
                    totalProfit += stats.profit;
                    totalRemainingValue += stats.remainingValue;
                    if (stats.remaining > 0) hasRemaining = true;
                });

                return { totalCost, totalRevenue, totalProfit, totalRemainingValue, hasRemaining };
            }

            function renderAll() {
                renderDateDisplay();
                renderItems();
                renderSummary();
            }

            function renderDateDisplay() {
                const displayText = formatDateDisplay(currentDate) + ' ' + getWeekDay(currentDate);
                if (isToday(currentDate)) {
                    $dateDisplay.innerHTML = `${displayText} <span class="date-today-badge">今天</span>`;
                } else {
                    $dateDisplay.textContent = displayText;
                }
                const tomorrowDate = getDateString(new Date(Date.now() + 86400000));
                if (currentDate >= tomorrowDate) {
                    $btnNextDay.style.opacity = '0.35';
                    $btnNextDay.style.pointerEvents = 'none';
                } else {
                    $btnNextDay.style.opacity = '1';
                    $btnNextDay.style.pointerEvents = 'auto';
                }
            }

            function renderItems() {
                $itemsList.innerHTML = '';

                if (currentItems.length === 0) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.style.cssText =
                        'text-align:center;padding:30px 20px;color:#bcc8d2;font-size:0.9rem;line-height:1.6;';
                    emptyDiv.innerHTML =
                        '📝 暂无货物<br><span style="font-size:0.75rem;">点击下方「添加货物」开始记录</span>';
                    $itemsList.appendChild(emptyDiv);
                    return;
                }

                currentItems.forEach((item, index) => {
                    const stats = calcItemStats(item);
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.setAttribute('data-index', index);
                    card.innerHTML = `
                        <div class="item-card-header">
                            <span class="item-number-badge">${index + 1}</span>
                            <input type="text" class="item-name-input" 
                                   value="${escapeHtml(item.name)}" 
                                   placeholder="物品名称，如：大明虾" 
                                   data-index="${index}" data-field="name"
                                   autocomplete="off">
                            <button class="item-delete-btn" data-index="${index}" data-action="delete" aria-label="删除">✕</button>
                        </div>
                        <div class="item-fields">
                            <div class="field-group">
                                <span class="field-label">📥 进货数量</span>
                                <input type="number" class="field-input" 
                                       value="${item.quantity || ''}" 
                                       placeholder="斤/公斤"
                                       data-index="${index}" data-field="quantity"
                                       step="any" inputmode="decimal" min="0">
                            </div>
                            <div class="field-group">
                                <span class="field-label">💲 进货单价</span>
                                <input type="number" class="field-input" 
                                       value="${item.unitPrice || ''}" 
                                       placeholder="元/斤"
                                       data-index="${index}" data-field="unitPrice"
                                       step="0.01" inputmode="decimal" min="0">
                            </div>
                            <div class="field-group">
                                <span class="field-label">📊 总成本（自动）</span>
                                <input type="text" class="field-input calc-total-cost" 
                                       value="${formatMoneyPlain(stats.totalCost)}" 
                                       readonly tabindex="-1" data-index="${index}">
                            </div>
                            <div class="field-group">
                                <span class="field-label">🛒 售出总价</span>
                                <input type="number" class="field-input" 
                                       value="${item.totalSale || ''}" 
                                       placeholder="总共卖了多少钱"
                                       data-index="${index}" data-field="totalSale"
                                       step="0.01" inputmode="decimal" min="0">
                            </div>
                            <div class="field-group">
                                <span class="field-label">📦 剩余数量</span>
                                <input type="number" class="field-input" 
                                       value="${item.remaining || ''}" 
                                       placeholder="没卖完的"
                                       data-index="${index}" data-field="remaining"
                                       step="any" inputmode="decimal" min="0">
                            </div>
                            <div class="field-group">
                                <span class="field-label">📈 净利润（自动）</span>
                                <input type="text" class="field-input input-profit calc-profit ${stats.profit >= 0 ? 'positive' : 'negative'}" 
                                       value="${formatMoneyPlain(stats.profit)}" 
                                       readonly tabindex="-1" data-index="${index}">
                            </div>
                        </div>
                    `;
                    $itemsList.appendChild(card);
                });
            }

            function renderSummary() {
                const summary = calcSummary(currentItems);
                $totalCost.textContent = formatMoney(summary.totalCost);
                $totalRevenue.textContent = formatMoney(summary.totalRevenue);
                $totalProfit.textContent = formatMoney(summary.totalProfit);
                $totalProfit.classList.remove('negative');
                if (summary.totalProfit < 0) {
                    $totalProfit.classList.add('negative');
                }
                if (summary.hasRemaining) {
                    $remainingHint.style.display = 'flex';
                    $remainingValue.textContent = formatMoney(summary.totalRemainingValue);
                } else {
                    $remainingHint.style.display = 'none';
                }
            }

            function updateSingleItemDisplay(index) {
                const item = currentItems[index];
                if (!item) return;
                const stats = calcItemStats(item);
                const card = document.querySelector(`.item-card[data-index="${index}"]`);
                if (!card) return;

                const costInput = card.querySelector('.calc-total-cost');
                if (costInput) {
                    costInput.value = formatMoneyPlain(stats.totalCost);
                }
                const profitInput = card.querySelector('.calc-profit');
                if (profitInput) {
                    profitInput.value = formatMoneyPlain(stats.profit);
                    profitInput.classList.remove('positive', 'negative');
                    profitInput.classList.add(stats.profit >= 0 ? 'positive' : 'negative');
                }
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function handleDateChange(direction) {
                const parts = currentDate.split('-');
                const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                d.setDate(d.getDate() + direction);
                const newDateStr = getDateString(d);
                const maxDate = getDateString(new Date(Date.now() + 86400000));
                if (newDateStr > maxDate) return;
                autoSaveCurrentIfNeeded();
                currentDate = newDateStr;
                loadCurrentDateData();
                renderAll();
            }

            function autoSaveCurrentIfNeeded() {
                if (currentItems.length > 0) {
                    const hasContent = currentItems.some(item =>
                        item.name || item.quantity || item.unitPrice || item.totalSale || item.remaining
                    );
                    if (hasContent && currentDate === todayStr) {
                        setRecord(currentDate, currentItems);
                    }
                }
            }

            function loadCurrentDateData() {
                const record = getRecord(currentDate);
                if (record && record.items && record.items.length > 0) {
                    currentItems = record.items.map(item => ({ ...item }));
                } else {
                    currentItems = [];
                }
            }

            function handleItemInput(index, field, value) {
                if (index < 0 || index >= currentItems.length) return;
                const numFields = ['quantity', 'unitPrice', 'totalSale', 'remaining'];
                if (numFields.includes(field)) {
                    currentItems[index][field] = value === '' ? '' : parseFloat(value);
                } else {
                    currentItems[index][field] = value;
                }
            }

            function handleDeleteItem(index) {
                if (index < 0 || index >= currentItems.length) return;
                const itemName = currentItems[index].name || `货物${index + 1}`;
                if (confirm(`确定要删除「${itemName}」吗？此操作不可恢复。`)) {
                    currentItems.splice(index, 1);
                    renderAll();
                    showToast(`已删除「${itemName}」`, 'info');
                }
            }

            function handleAddItem() {
                currentItems.push({
                    name: '',
                    quantity: '',
                    unitPrice: '',
                    totalSale: '',
                    remaining: '',
                });
                renderAll();
                setTimeout(() => {
                    const cards = $itemsList.querySelectorAll('.item-card');
                    if (cards.length > 0) {
                        const lastCard = cards[cards.length - 1];
                        lastCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        const nameInput = lastCard.querySelector('.item-name-input');
                        if (nameInput) nameInput.focus();
                    }
                }, 150);
                showToast('已添加新货物条目', 'info');
            }

            function handleSave() {
                const cleanedItems = currentItems.filter(item => {
                    return item.name || (parseFloat(item.quantity) || 0) > 0;
                });

                if (cleanedItems.length === 0) {
                    deleteRecord(currentDate);
                    currentItems = [];
                    renderAll();
                    showToast('已清空今日数据', 'info');
                    return;
                }

                setRecord(currentDate, cleanedItems);
                currentItems = cleanedItems.map(item => ({ ...item }));
                renderAll();
                showToast('✅ 数据已保存成功！', 'success');
            }

            function handleClear() {
                if (currentItems.length === 0) {
                    showToast('当前没有数据需要清空', 'info');
                    return;
                }
                if (confirm(`确定要清空 ${formatDateDisplay(currentDate)} 的所有货物数据吗？\n此操作不可恢复。`)) {
                    deleteRecord(currentDate);
                    currentItems = [];
                    renderAll();
                    showToast('已清空所有数据', 'info');
                }
            }

            function openHistoryModal() {
                modalMode = 'list';
                modalDetailDate = null;
                $modalTitle.textContent = '📅 历史记录';
                renderHistoryList();
                $modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeHistoryModal() {
                $modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => {
                    modalMode = 'list';
                    modalDetailDate = null;
                }, 350);
            }

            function renderHistoryList() {
                const dates = Object.keys(allRecords).sort().reverse();
                if (dates.length === 0) {
                    $modalBody.innerHTML = `
                        <div class="history-empty">
                            <span class="history-empty-icon">📭</span>
                            暂无历史记录<br>
                            <span style="font-size:0.75rem;color:#bcc8d2;">保存数据后，历史记录会显示在这里</span>
                        </div>`;
                    return;
                }

                let html = '';
                dates.forEach(dateStr => {
                    const record = allRecords[dateStr];
                    const summary = calcSummary(record.items || []);
                    const profitClass = summary.totalProfit >= 0 ? 'positive' : 'negative';
                    const itemCount = (record.items || []).length;
                    const isTodayLabel = isToday(dateStr) ?
                        ' <span style="font-size:0.6rem;background:#ff6b6b;color:#fff;padding:2px 7px;border-radius:10px;">今天</span>' :
                        '';

                    html += `
                        <div class="history-date-item" data-date="${dateStr}">
                            <div>
                                <div class="history-date-label">
                                    ${formatDateDisplay(dateStr)} ${getWeekDay(dateStr)}${isTodayLabel}
                                </div>
                                <div style="font-size:0.7rem;color:#8a9baa;margin-top:2px;">
                                    ${itemCount} 种货物 · 更新于 ${formatTimeAgo(record.updatedAt)}
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span class="history-date-profit ${profitClass}">${formatMoney(summary.totalProfit)}</span>
                                <span class="history-date-arrow">›</span>
                            </div>
                        </div>`;
                });

                $modalBody.innerHTML = html;

                $modalBody.querySelectorAll('.history-date-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const dateStr = this.getAttribute('data-date');
                        openHistoryDetail(dateStr);
                    });
                });
            }

            function openHistoryDetail(dateStr) {
                modalMode = 'detail';
                modalDetailDate = dateStr;
                $modalTitle.textContent = '📋 历史详情';
                const record = allRecords[dateStr];
                const items = record ? (record.items || []) : [];
                const summary = calcSummary(items);

                let html = `
                    <div class="history-detail-back" id="btnBackToList">← 返回列表</div>
                    <div class="history-detail-date">
                        ${formatDateDisplay(dateStr)} ${getWeekDay(dateStr)}
                        ${isToday(dateStr) ? '<span class="date-today-badge">今天</span>' : ''}
                    </div>`;

                if (items.length === 0) {
                    html += '<div class="history-empty"><span class="history-empty-icon">📭</span>该日期无货物记录</div>';
                } else {
                    items.forEach((item, i) => {
                        const stats = calcItemStats(item);
                        html += `
                            <div class="history-item-card">
                                <div style="font-weight:700;font-size:0.95rem;color:#0a3d62;margin-bottom:6px;">
                                    ${i + 1}. ${escapeHtml(item.name || '未命名')}
                                </div>
                                <div class="history-item-row"><span>进货数量</span><strong>${item.quantity || 0}</strong></div>
                                <div class="history-item-row"><span>进货单价</span><strong>¥${formatMoneyPlain(item.unitPrice)}</strong></div>
                                <div class="history-item-row"><span>总成本</span><strong>¥${formatMoneyPlain(stats.totalCost)}</strong></div>
                                <div class="history-item-row"><span>售出总价</span><strong>¥${formatMoneyPlain(item.totalSale)}</strong></div>
                                <div class="history-item-row"><span>剩余数量</span><strong>${stats.remaining}</strong></div>
                                <div class="history-item-row" style="border-top:1px dashed #e0e8ee;margin-top:4px;padding-top:4px;">
                                    <span>净利润</span>
                                    <strong style="color:${stats.profit >= 0 ? '#10b981' : '#ff6b6b'};font-size:1rem;">
                                        ${formatMoney(stats.profit)}
                                    </strong>
                                </div>
                            </div>`;
                    });

                    html += `
                        <div style="background:#f0f7fb;border-radius:12px;padding:14px;margin-top:10px;text-align:center;">
                            <div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;">
                                <div><span style="font-size:0.7rem;color:#6b8299;">总成本</span><br><strong>${formatMoney(summary.totalCost)}</strong></div>
                                <div><span style="font-size:0.7rem;color:#6b8299;">总售出</span><br><strong>${formatMoney(summary.totalRevenue)}</strong></div>
                                <div><span style="font-size:0.7rem;color:#6b8299;">净利润</span><br><strong style="color:${summary.totalProfit >= 0 ? '#10b981' : '#ff6b6b'};font-size:1.2rem;">${formatMoney(summary.totalProfit)}</strong></div>
                            </div>
                            ${summary.hasRemaining ? `<div style="margin-top:8px;font-size:0.75rem;color:#6b8299;">剩余货物价值：<strong>${formatMoney(summary.totalRemainingValue)}</strong></div>` : ''}
                        </div>`;
                }

                if (!isToday(dateStr) && items.length > 0) {
                    html += `
                        <button class="btn btn-save" style="width:100%;margin-top:12px;" id="btnLoadToToday">
                            📥 加载到今日继续编辑
                        </button>`;
                }

                html += `
                    <button class="btn btn-clear" style="width:100%;margin-top:8px;" id="btnDeleteThisDate">
                        🗑 删除此日期的记录
                    </button>`;

                $modalBody.innerHTML = html;

                const backBtn = document.getElementById('btnBackToList');
                if (backBtn) {
                    backBtn.addEventListener('click', () => {
                        modalMode = 'list';
                        modalDetailDate = null;
                        $modalTitle.textContent = '📅 历史记录';
                        renderHistoryList();
                    });
                }

                const loadBtn = document.getElementById('btnLoadToToday');
                if (loadBtn) {
                    loadBtn.addEventListener('click', () => {
                        if (confirm('将加载此日期的货物数据到今日进行编辑，今日原有数据将被覆盖。确定继续？')) {
                            currentDate = todayStr;
                            currentItems = items.map(item => ({ ...item }));
                            setRecord(todayStr, currentItems);
                            renderAll();
                            closeHistoryModal();
                            showToast('已加载到今日，请检查并保存', 'success');
                        }
                    });
                }

                const delBtn = document.getElementById('btnDeleteThisDate');
                if (delBtn) {
                    delBtn.addEventListener('click', () => {
                        if (confirm(`确定永久删除 ${formatDateDisplay(dateStr)} 的所有记录吗？\n此操作不可恢复。`)) {
                            deleteRecord(dateStr);
                            if (dateStr === currentDate) {
                                currentItems = [];
                                renderAll();
                            }
                            modalMode = 'list';
                            modalDetailDate = null;
                            $modalTitle.textContent = '📅 历史记录';
                            renderHistoryList();
                            showToast('记录已删除', 'info');
                        }
                    });
                }
            }

            function formatTimeAgo(isoStr) {
                if (!isoStr) return '未知';
                try {
                    const now = new Date();
                    const then = new Date(isoStr);
                    const diffMs = now - then;
                    const diffMin = Math.floor(diffMs / 60000);
                    if (diffMin < 1) return '刚刚';
                    if (diffMin < 60) return `${diffMin}分钟前`;
                    const diffHr = Math.floor(diffMin / 60);
                    if (diffHr < 24) return `${diffHr}小时前`;
                    const diffDay = Math.floor(diffHr / 24);
                    if (diffDay < 30) return `${diffDay}天前`;
                    return formatDateDisplay(getDateString(then));
                } catch (e) {
                    return '未知';
                }
            }

            $btnPrevDay.addEventListener('click', () => handleDateChange(-1));
            $btnNextDay.addEventListener('click', () => handleDateChange(1));
            $btnAddItem.addEventListener('click', handleAddItem);
            $btnSave.addEventListener('click', handleSave);
            $btnClear.addEventListener('click', handleClear);
            $btnHistory.addEventListener('click', openHistoryModal);

            $modalOverlay.addEventListener('click', function(e) {
                if (e.target === $modalOverlay) {
                    closeHistoryModal();
                }
            });

            const modalSheet = $modalOverlay.querySelector('.modal-sheet');
            let touchStartY = 0;
            modalSheet.addEventListener('touchstart', function(e) {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            modalSheet.addEventListener('touchmove', function(e) {
                const deltaY = e.touches[0].clientY - touchStartY;
                if (deltaY > 80 && modalSheet.scrollTop <= 5) {
                    closeHistoryModal();
                }
            }, { passive: true });

            // 核心修复：输入时只更新数据和计算字段，不重建整个列表
            $itemsList.addEventListener('input', function(e) {
                const target = e.target;
                if (!target.classList.contains('field-input') && !target.classList.contains('item-name-input')) return;
                if (target.hasAttribute('readonly')) return;
                const index = parseInt(target.getAttribute('data-index'));
                const field = target.getAttribute('data-field');
                if (isNaN(index) || !field) return;

                // 更新数据模型
                handleItemInput(index, field, target.value);

                // 刷新该卡片的自动计算字段和汇总，不销毁输入框
                updateSingleItemDisplay(index);
                renderSummary();
            });

            $itemsList.addEventListener('click', function(e) {
                const btn = e.target.closest('.item-delete-btn');
                if (!btn) return;
                const index = parseInt(btn.getAttribute('data-index'));
                if (isNaN(index)) return;
                e.preventDefault();
                e.stopPropagation();
                handleDeleteItem(index);
            });

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    handleSave();
                }
            });

            window.addEventListener('beforeunload', function() {
                if (currentDate === todayStr && currentItems.length > 0) {
                    const hasContent = currentItems.some(item =>
                        item.name || item.quantity || item.unitPrice || item.totalSale || item.remaining
                    );
                    if (hasContent) {
                        setRecord(currentDate, currentItems);
                    }
                }
            });

            document.addEventListener('visibilitychange', function() {
                if (document.hidden && currentDate === todayStr && currentItems.length > 0) {
                    const hasContent = currentItems.some(item =>
                        item.name || item.quantity || item.unitPrice || item.totalSale || item.remaining
                    );
                    if (hasContent) {
                        setRecord(currentDate, currentItems);
                    }
                }
                if (!document.hidden) {
                    loadAllRecords();
                    loadCurrentDateData();
                    renderAll();
                }
            });

            function init() {
                loadAllRecords();
                currentDate = todayStr;
                loadCurrentDateData();
                renderAll();

                const allDates = Object.keys(allRecords).filter(d => d !== todayStr);
                if (allDates.length > 0 && currentItems.length === 0) {
                    const latestDate = allDates.sort().reverse()[0];
                    const latestRecord = allRecords[latestDate];
                    const latestSummary = calcSummary(latestRecord.items || []);
                    if (latestSummary.hasRemaining) {
                        setTimeout(() => {
                            showToast(
                                `💡 ${formatDateDisplay(latestDate)} 有剩余货物价值 ${formatMoney(latestSummary.totalRemainingValue)}，可手动添加到今日`,
                                'info');
                        }, 600);
                    }
                }
            }

            init();
        })();
    </script>
</body>
</html>
